name: Release / Quality

on:
  workflow_call:
    outputs:
      test_report_url:
        description: Published release reports root URL
        value: ${{ jobs.publish_reports.outputs.test_report_url }}
      allure_ui_report_url:
        description: Published Allure UI test report URL
        value: ${{ jobs.publish_reports.outputs.allure_ui_report_url }}
      allure_unit_report_url:
        description: Published Allure unit test report URL
        value: ${{ jobs.publish_reports.outputs.allure_unit_report_url }}
      sonar_report_url:
        description: Published SonarQube static report URL
        value: ${{ jobs.publish_reports.outputs.sonar_report_url }}
      sonar_dashboard_url:
        description: SonarQube dashboard URL
        value: ${{ jobs.sonar.outputs.sonar_dashboard_url }}
    secrets:
      REPORTS_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
      packages: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      RELEASE_NAME: ${{ github.event.release.name }}
      ASSETS_DIR: assets
      ADAPTER_CF_XML: ${{ github.event.repository.name }}-cf-xml.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CF-XML artifacts
        uses: actions/download-artifact@v4
        with:
          name: cf-xml-artifacts
          path: ${{ env.ASSETS_DIR }}

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Log in to GHCR for Docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read EDT version from image metadata
        run: |
          set -euo pipefail

          image_ref="ghcr.io/shadobaai/edtcli:latest"

          config_json="$(oras manifest fetch-config --platform linux/amd64 "${image_ref}")"
          edt_version="$(jq -r '
            (.config.Labels // .config.labels // .labels // {}) as $labels
            | $labels["ru.shadobaai.onec.edt-version"]
              // $labels["org.opencontainers.image.version"]
              // empty
          ' <<< "${config_json}")"

          if [ -z "${edt_version}" ]; then
            manifest_json="$(oras manifest fetch --platform linux/amd64 "${image_ref}")"
            edt_version="$(jq -r '
              (.annotations // .labels // {}) as $labels
              | $labels["ru.shadobaai.onec.edt-version"]
                // $labels["org.opencontainers.image.version"]
                // empty
            ' <<< "${manifest_json}")"
          fi

          if [ -z "${edt_version}" ]; then
            echo "::error::EDT version was not found in ${image_ref} metadata"
            exit 1
          fi

          echo "EDT_VERSION=${edt_version}" >> "$GITHUB_ENV"
          echo "REPORT_RUN_STARTED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Download base and examples release assets
        run: |
          mkdir -p "${ASSETS_DIR}"
          gh release download --repo ShadobaAI/kafka-adapter-base --pattern "kafka-adapter-base-xml.zip" --output "${ASSETS_DIR}/kafka-adapter-base-xml.zip"
          gh release download --repo ShadobaAI/kafka-adapter-examples --pattern "kafka-adapter-examples.cfe" --output "${ASSETS_DIR}/kafka-adapter-examples.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download test DT template
        run: |
          mkdir -p "${ASSETS_DIR}"
          oras pull ghcr.io/shadobaai/kfk-tmpl-test:latest -o "${ASSETS_DIR}"

      - name: Download unit test assets
        run: |
          mkdir -p "${ASSETS_DIR}/unit"
          oras pull ghcr.io/shadobaai/unit:latest -o "${ASSETS_DIR}/unit"
          if [ ! -f "${ASSETS_DIR}/unit/unit.cfe" ] && [ -f "${ASSETS_DIR}/unit/output/unit.cfe" ]; then
            cp "${ASSETS_DIR}/unit/output/unit.cfe" "${ASSETS_DIR}/unit/unit.cfe"
          fi
          curl -fsSL \
            https://raw.githubusercontent.com/ShadobaAI/kafka-adapter-tests-unit/main/YaxParams.json \
            -o "${ASSETS_DIR}/unit/YaxParams.json"

      - name: Download UI test assets
        uses: actions/checkout@v4
        with:
          repository: ShadobaAI/kafka-adapter-tests-ui
          path: ${{ env.ASSETS_DIR }}/ui
          sparse-checkout: |
            /features/**
            /VAParams.json
          sparse-checkout-cone-mode: false

      - name: Download Vanessa Automation
        run: |
          mkdir -p "${ASSETS_DIR}/ui"
          echo "VANESSA_AUTOMATION_VERSION=$(gh release view --repo Pr-Mex/vanessa-automation --json tagName --jq .tagName)" >> "$GITHUB_ENV"
          gh release download --repo Pr-Mex/vanessa-automation --pattern "VAExtension*.cfe" --output "${ASSETS_DIR}/ui/VAExtension.cfe"
          gh release download --repo Pr-Mex/vanessa-automation --pattern "vanessa-automation-single.*.zip" --output "${RUNNER_TEMP}/vanessa-automation-single.zip"
          unzip -j "${RUNNER_TEMP}/vanessa-automation-single.zip" "vanessa-automation-single.epf" -d "${ASSETS_DIR}/ui"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download YAxUnit
        run: |
          mkdir -p "${ASSETS_DIR}/unit"
          echo "YAXUNIT_VERSION=$(gh release view --repo bia-technologies/yaxunit --json tagName --jq .tagName)" >> "$GITHUB_ENV"
          gh release download --repo bia-technologies/yaxunit --pattern "YAxUnit-*.cfe" --output "${ASSETS_DIR}/unit/YAXUNIT.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check test inputs
        run: |
          missing=0
          check_file() {
            if [ ! -f "$1" ]; then
              echo "::error::File not found: $1"
              missing=1
            fi
          }
          check_dir() {
            if [ ! -d "$1" ]; then
              echo "::error::Directory not found: $1"
              missing=1
            fi
          }

          check_file "${ASSETS_DIR}/${ADAPTER_CF_XML}"
          check_file "${ASSETS_DIR}/kafka-adapter-base-xml.zip"
          check_file "${ASSETS_DIR}/kafka-adapter-examples.cfe"
          check_file "${ASSETS_DIR}/kfk-tmpl-test.dt"
          check_file "${ASSETS_DIR}/unit/unit.cfe"
          check_file "${ASSETS_DIR}/unit/YaxParams.json"
          check_file "${ASSETS_DIR}/unit/YAXUNIT.cfe"
          check_file "${ASSETS_DIR}/ui/VAParams.json"
          check_dir "${ASSETS_DIR}/ui/features"
          check_file "${ASSETS_DIR}/ui/VAExtension.cfe"
          check_file "${ASSETS_DIR}/ui/vanessa-automation-single.epf"

          if [ "$missing" -ne 0 ]; then
            echo "Downloaded assets:"
            find "${ASSETS_DIR}" -maxdepth 3 -mindepth 1 -print | sort
            exit 1
          fi

      - name: Build base XML for tests
        run: |
          python3 .github/scripts/create_test_cf.py \
            --base "${ASSETS_DIR}/kafka-adapter-base-xml.zip" \
            --adapter "${ASSETS_DIR}/${ADAPTER_CF_XML}" \
            --output "${ASSETS_DIR}/base"

      - name: Create test infobase
        run: |
          docker run --rm -v "${{ github.workspace }}/${ASSETS_DIR}:/work" -w /work \
            ghcr.io/shadobaai/ibcmd:latest bash -c "
            vrunner init-dev --src /work/base --dt /work/kfk-tmpl-test.dt --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/kafka-adapter-examples.cfe --extension 'ТестированиеАдаптераKafka' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/unit/YAXUNIT.cfe --extension 'YAXUNIT' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/unit/unit.cfe --extension 'МодульныеТесты' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/ui/VAExtension.cfe --extension 'VAExtension' --updatedb --ibcmd --ibconnection /F/work/base-db
          "
          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/base-db"

      - name: Fill test infobase
        run: |
          docker run --rm --init \
            -v "${{ github.workspace }}/${ASSETS_DIR}:/work" \
            -v "${{ github.workspace }}/.github/scripts/fill-test-infobase-docker.sh:/fill-test-infobase-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /fill-test-infobase-docker.sh
          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/base-db"

      - name: Backup test infobase
        run: |
          cp "${ASSETS_DIR}/base-db/1Cv8.1CD" "${ASSETS_DIR}/1Cv8.1CD"

      - name: Check test infobase
        run: |
          test -f "${ASSETS_DIR}/1Cv8.1CD"

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: |
          rm -rf "${ASSETS_DIR}/unit/base-unit"
          mkdir -p "${ASSETS_DIR}/unit/base-unit"
          cp "${ASSETS_DIR}/1Cv8.1CD" "${ASSETS_DIR}/unit/base-unit/1Cv8.1CD"

          set +e
          docker run --rm --init \
            -e COVERAGE_PROJECT_DIR=/coverage-project \
            -v "${{ github.workspace }}/${ASSETS_DIR}/unit:/work" \
            -v "${{ github.workspace }}:/coverage-project:ro" \
            -v "${{ github.workspace }}/.github/scripts/run-unit-docker.sh:/run-unit-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /run-unit-docker.sh
          rc=$?
          set -e

          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/unit"
          exit "$rc"

      - name: Run UI tests
        id: ui_tests
        if: steps.unit_tests.outcome == 'success'
        continue-on-error: true
        run: |
          rm -rf "${ASSETS_DIR}/ui/base-ui"
          mkdir -p "${ASSETS_DIR}/ui/base-ui"
          cp "${ASSETS_DIR}/1Cv8.1CD" "${ASSETS_DIR}/ui/base-ui/1Cv8.1CD"

          set +e
          docker run --rm --init \
            -e COVERAGE_PROJECT_DIR=/coverage-project \
            -v "${{ github.workspace }}/${ASSETS_DIR}/ui:/work" \
            -v "${{ github.workspace }}:/coverage-project:ro" \
            -v "${{ github.workspace }}/.github/scripts/run-ui-docker.sh:/run-ui-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /run-ui-docker.sh
          rc=$?
          set -e

          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/ui"
          exit "$rc"

      - name: Prepare Allure sources
        id: allure_results
        if: always()
        run: |
          rm -rf \
            "${ASSETS_DIR}/allure-unit" \
            "${ASSETS_DIR}/allure-ui" \
            "${ASSETS_DIR}/allure-unit-report" \
            "${ASSETS_DIR}/allure-ui-report"

          python3 .github/scripts/prepare_allure_results.py \
            --results-dir "${ASSETS_DIR}/allure-unit" \
            --unit-dir "${ASSETS_DIR}/unit" \
            --ui-dir "${ASSETS_DIR}/ui" \
            --scope unit

          python3 .github/scripts/prepare_allure_results.py \
            --results-dir "${ASSETS_DIR}/allure-ui" \
            --unit-dir "${ASSETS_DIR}/unit" \
            --ui-dir "${ASSETS_DIR}/ui" \
            --scope ui

          if find "${ASSETS_DIR}/allure-unit" -name '*-result.json' -print -quit | grep -q .; then
            echo "unit_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "unit_available=false" >> "$GITHUB_OUTPUT"
          fi

          if find "${ASSETS_DIR}/allure-ui" -name '*-result.json' -print -quit | grep -q .; then
            echo "ui_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Allure unit report
        id: allure_unit_report
        if: always() && steps.allure_results.outputs.unit_available == 'true'
        run: |
          npx --yes allure generate "${ASSETS_DIR}/allure-unit" -o "${ASSETS_DIR}/allure-unit-report"
          test -f "${ASSETS_DIR}/allure-unit-report/summary.json"
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Generate Allure UI report
        id: allure_ui_report
        if: always() && steps.allure_results.outputs.ui_available == 'true'
        run: |
          npx --yes allure generate "${ASSETS_DIR}/allure-ui" -o "${ASSETS_DIR}/allure-ui-report"
          test -f "${ASSETS_DIR}/allure-ui-report/summary.json"
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Upload Allure unit report
        if: always() && steps.allure_unit_report.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-unit-report
          path: ${{ env.ASSETS_DIR }}/allure-unit-report
          if-no-files-found: warn

      - name: Upload Allure UI report
        if: always() && steps.allure_ui_report.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-ui-report
          path: ${{ env.ASSETS_DIR }}/allure-ui-report
          if-no-files-found: warn

      - name: Upload SonarQube coverage inputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-coverage-inputs
          path: |
            ${{ env.ASSETS_DIR }}/unit/genericCoverage.xml
            ${{ env.ASSETS_DIR }}/ui/genericCoverage.xml
          if-no-files-found: warn

      - name: Fail on test errors
        if: always()
        run: |
          if [ "${{ steps.unit_tests.outcome }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/unit/allure" ]; then
            echo "Unit Allure results not found: ${ASSETS_DIR}/unit/allure"
            exit 1
          fi
          if [ ! -f "${ASSETS_DIR}/unit/genericCoverage.xml" ]; then
            echo "Unit coverage report not found: ${ASSETS_DIR}/unit/genericCoverage.xml"
            exit 1
          fi

          if [ "${{ steps.ui_tests.outcome }}" != "success" ]; then
            echo "UI tests failed"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/ui/allure" ]; then
            echo "UI Allure results not found: ${ASSETS_DIR}/ui/allure"
            exit 1
          fi
          if [ ! -f "${ASSETS_DIR}/ui/genericCoverage.xml" ]; then
            echo "UI coverage report not found: ${ASSETS_DIR}/ui/genericCoverage.xml"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/allure-unit-report" ]; then
            echo "Generated Allure unit test report not found: ${ASSETS_DIR}/allure-unit-report"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/allure-ui-report" ]; then
            echo "Generated Allure UI test report not found: ${ASSETS_DIR}/allure-ui-report"
            exit 1
          fi

  sonar:
    name: SonarQube
    needs: [tests]
    if: always() && needs.tests.result != 'skipped'
    uses: ./.github/workflows/release-sonar.yml
    secrets: inherit

  publish_reports:
    name: Publish release reports
    needs: [tests, sonar]
    if: always() && needs.tests.result != 'skipped' && needs.sonar.result != 'skipped'
    uses: ./.github/workflows/release-publish-reports.yml
    with:
      sonar_dashboard_url: ${{ needs.sonar.outputs.sonar_dashboard_url }}
    secrets: inherit
