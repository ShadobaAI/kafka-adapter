name: Release / Build CF

on:
  workflow_call:

jobs:
  build_cf:
    name: Build CF
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kafka-tools
          path: .ci

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.owner.outputs.value }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CF-XML artifacts
        uses: actions/download-artifact@v4
        with:
          name: cf-xml-artifacts
          path: output

      - name: Unpack CF-XML
        run: |
          mkdir -p "${{ runner.temp }}/cf-xml"
          unzip -q "output/${{ github.event.repository.name }}-cf-xml.zip" -d "${{ runner.temp }}/cf-xml"

      - name: Build CF
        uses: ./.ci/.github/actions/xml2cf
        with:
          xml-dir: ${{ runner.temp }}/cf-xml
          output-file: output/${{ github.event.repository.name }}.cf

      - name: Upload CF artifacts to release
        run: gh release upload "${RELEASE_TAG}" output/* --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
