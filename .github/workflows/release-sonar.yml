name: Release / SonarQube

on:
  workflow_call:
    outputs:
      sonar_dashboard_url:
        description: SonarQube dashboard URL
        value: ${{ jobs.sonar.outputs.sonar_dashboard_url }}

jobs:
  sonar:
    name: SonarQube
    runs-on: [self-hosted, linux, x64, sonar-docker]
    defaults:
      run:
        shell: bash
    outputs:
      sonar_dashboard_url: ${{ steps.sonar_report.outputs.dashboard_url }}
    permissions:
      contents: read
      actions: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      ASSETS_DIR: assets
      SONAR_HOST_URL: "${{ vars.SONAR_HOST_URL || 'http://localhost:9000' }}"
      SONAR_PROJECT_KEY: ${{ github.event.repository.name }}
      SONAR_PROJECT_NAME: ${{ github.event.repository.name }}
      SONARQUBE_BACKUP_DIRS: ${{ vars.SONARQUBE_BACKUP_DIRS }}
      SONARQUBE_DB_CONTAINER: ${{ vars.SONARQUBE_DB_CONTAINER || 'db' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SonarQube coverage inputs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sonar-coverage-inputs
          path: ${{ env.ASSETS_DIR }}

      - name: Run SonarQube analysis
        id: sonar_scan
        run: |
          if [ -z "${SONAR_HOST_URL}" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "skip_reason=SONAR_HOST_URL is not configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f "${ASSETS_DIR}/unit/genericCoverage.xml" ] || [ ! -f "${ASSETS_DIR}/ui/genericCoverage.xml" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Unit or UI coverage XML is missing" >> "$GITHUB_OUTPUT"
            echo "dashboard_url=${SONAR_HOST_URL%/}/dashboard?id=${SONAR_PROJECT_KEY}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scanner_args=(
            "-Dsonar.host.url=${SONAR_HOST_URL}"
            "-Dsonar.projectKey=${SONAR_PROJECT_KEY}"
            "-Dsonar.projectName=${SONAR_PROJECT_NAME}"
            "-Dsonar.projectVersion=${RELEASE_TAG}"
            "-Dsonar.coverageReportPaths=${ASSETS_DIR}/unit/genericCoverage.xml,${ASSETS_DIR}/ui/genericCoverage.xml"
          )

          rm -rf .scannerwork
          set +e
          if command -v sonar-scanner >/dev/null 2>&1; then
            sonar-scanner "${scanner_args[@]}"
          else
            docker_args=(
              run --rm --init --user "$(id -u):$(id -g)"
              -e SONAR_HOST_URL="${SONAR_HOST_URL}"
            )
            if [ -f /.dockerenv ] && docker container inspect "${HOSTNAME}" >/dev/null 2>&1; then
              docker_args+=(--volumes-from "${HOSTNAME}" -w "${GITHUB_WORKSPACE}")
            else
              docker_args+=(-v "${GITHUB_WORKSPACE}:/usr/src" -w /usr/src)
            fi

            docker "${docker_args[@]}" sonarsource/sonar-scanner-cli:latest "${scanner_args[@]}"
          fi
          rc=$?
          set -e

          if [ -f .scannerwork/report-task.txt ]; then
            dashboard_url="$(awk -F= '$1 == "dashboardUrl" {print $2}' .scannerwork/report-task.txt)"
            if [ -n "${dashboard_url}" ]; then
              echo "dashboard_url=${dashboard_url}" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ "$rc" -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "skip_reason=sonar-scanner exited with code ${rc}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SonarQube summary
        id: sonar_report
        if: always()
        run: |
          skip_reason="${{ steps.sonar_scan.outputs.skip_reason }}"
          args=()
          if [ -n "${skip_reason}" ]; then
            args+=(--skip-reason "${skip_reason}")
          fi

          python3 .github/scripts/generate_sonar_summary.py \
            --output-dir "${ASSETS_DIR}/sonar" \
            --project-key "${SONAR_PROJECT_KEY}" \
            --project-name "${SONAR_PROJECT_NAME}" \
            --project-version "${RELEASE_TAG}" \
            --commit-sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --host-url "${SONAR_HOST_URL}" \
            --report-task-file ".scannerwork/report-task.txt" \
            --unit-coverage "${ASSETS_DIR}/unit/genericCoverage.xml" \
            --ui-coverage "${ASSETS_DIR}/ui/genericCoverage.xml" \
            "${args[@]}"

          dashboard_url="${{ steps.sonar_scan.outputs.dashboard_url }}"
          if [ -z "${dashboard_url}" ] && [ -n "${SONAR_HOST_URL}" ]; then
            dashboard_url="${SONAR_HOST_URL%/}/dashboard?id=${SONAR_PROJECT_KEY}"
          fi
          echo "dashboard_url=${dashboard_url}" >> "$GITHUB_OUTPUT"
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Upload SonarQube summary
        if: always() && steps.sonar_report.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sonar-summary
          path: ${{ env.ASSETS_DIR }}/sonar
          if-no-files-found: warn

      - name: Backup SonarQube database
        id: sonar_backup
        if: always()
        run: |
          if ! docker ps --format '{{.Names}}' | grep -Fxq "${SONARQUBE_DB_CONTAINER}"; then
            echo "PostgreSQL container '${SONARQUBE_DB_CONTAINER}' is not running"
            exit 1
          fi

          backup_name="sonarqube-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date -u +%Y%m%dT%H%M%SZ).dump"
          backup_output_dir="${ASSETS_DIR}/sonar-backup"
          backup_file="${backup_output_dir}/${backup_name}"

          mkdir -p "${backup_output_dir}"
          docker exec "${SONARQUBE_DB_CONTAINER}" sh -c 'pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB" -F c' > "${backup_file}"
          echo "generated=true" >> "$GITHUB_OUTPUT"

          if [ -z "${SONARQUBE_BACKUP_DIRS}" ]; then
            echo "SONARQUBE_BACKUP_DIRS is not configured, keeping SonarQube database backup only as a workflow artifact"
            exit 0
          fi

          printf '%s\n' "${SONARQUBE_BACKUP_DIRS}" \
            | tr ',;' '\n\n' \
            | while IFS= read -r backup_dir; do
                backup_dir="$(printf '%s' "${backup_dir}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
                if [ -z "${backup_dir}" ]; then
                  continue
                fi
                backup_dir="$(printf '%s' "${backup_dir}" | sed -E 's#^([A-Za-z]):\\#\1:/#;s#\\#/#g')"

                mkdir -p "${backup_dir}"
                cp "${backup_file}" "${backup_dir}/${backup_name}"

                find "${backup_dir}" -maxdepth 1 -type f -name 'sonarqube-*.dump' \
                  -printf '%T@ %p\n' \
                  | sort -rn \
                  | awk 'NR > 10 {print substr($0, index($0, $2))}' \
                  | while IFS= read -r old_backup; do
                      rm -f "${old_backup}"
                    done
              done

      - name: Upload SonarQube database backup
        if: always() && steps.sonar_backup.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-db-backup
          path: ${{ env.ASSETS_DIR }}/sonar-backup/*.dump
          if-no-files-found: error
          retention-days: 14
