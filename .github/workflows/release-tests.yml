name: Release / Tests

on:
  workflow_call:
    outputs:
      test_report_url:
        description: Published Allure test report URL
        value: ${{ jobs.tests.outputs.test_report_url }}
    secrets:
      REPORTS_TOKEN:
        required: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    outputs:
      test_report_url: ${{ steps.test_report_publish.outputs.remote_href }}
    permissions:
      contents: read
      actions: read
      checks: write
      packages: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ASSETS_DIR: assets
      ADAPTER_CF_XML: ${{ github.event.repository.name }}-cf-xml.zip
      TEST_REPORTS_REPOSITORY: ShadobaAI/kafka-adapter-tests-reports
      TEST_REPORTS_BRANCH: main
      TEST_REPORTS_DIR: test-reports
      TEST_REPORTS_BASE_URL: https://shadobaai.github.io/kafka-adapter-tests-reports
      TEST_REPORTS_KEEP_RUNS: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CF-XML artifacts
        uses: actions/download-artifact@v4
        with:
          name: cf-xml-artifacts
          path: ${{ env.ASSETS_DIR }}

      - name: Install oras
        run: |
          ORAS_TAG="$(curl -fsSL https://api.github.com/repos/oras-project/oras/releases/latest \
            | jq -r .tag_name)"
          ORAS_VERSION="${ORAS_TAG#v}"
          curl -fsSL "https://github.com/oras-project/oras/releases/download/${ORAS_TAG}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Log in to GHCR for Docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download base and examples release assets
        run: |
          mkdir -p "${ASSETS_DIR}"
          gh release download --repo ShadobaAI/kafka-adapter-base --pattern "kafka-adapter-base-xml.zip" --output "${ASSETS_DIR}/kafka-adapter-base-xml.zip"
          gh release download --repo ShadobaAI/kafka-adapter-examples --pattern "kafka-adapter-examples.cfe" --output "${ASSETS_DIR}/kafka-adapter-examples.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download test DT template
        run: |
          mkdir -p "${ASSETS_DIR}"
          oras pull ghcr.io/shadobaai/kfk-tmpl-test:latest -o "${ASSETS_DIR}"

      - name: Download unit test assets
        run: |
          mkdir -p "${ASSETS_DIR}/unit"
          oras pull ghcr.io/shadobaai/unit:latest -o "${ASSETS_DIR}/unit"
          if [ ! -f "${ASSETS_DIR}/unit/unit.cfe" ] && [ -f "${ASSETS_DIR}/unit/output/unit.cfe" ]; then
            cp "${ASSETS_DIR}/unit/output/unit.cfe" "${ASSETS_DIR}/unit/unit.cfe"
          fi
          curl -fsSL \
            https://raw.githubusercontent.com/ShadobaAI/kafka-adapter-tests-unit/main/YaxParams.json \
            -o "${ASSETS_DIR}/unit/YaxParams.json"

      - name: Download UI test assets
        uses: actions/checkout@v4
        with:
          repository: ShadobaAI/kafka-adapter-tests-ui
          path: ${{ env.ASSETS_DIR }}/ui
          sparse-checkout: |
            /features/**
            /VAParams.json
          sparse-checkout-cone-mode: false

      - name: Download Vanessa Automation
        run: |
          mkdir -p "${ASSETS_DIR}/ui"
          gh release download --repo Pr-Mex/vanessa-automation --pattern "VAExtension*.cfe" --output "${ASSETS_DIR}/ui/VAExtension.cfe"
          gh release download --repo Pr-Mex/vanessa-automation --pattern "vanessa-automation-single.*.zip" --output "${RUNNER_TEMP}/vanessa-automation-single.zip"
          unzip -j "${RUNNER_TEMP}/vanessa-automation-single.zip" "vanessa-automation-single.epf" -d "${ASSETS_DIR}/ui"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download YAxUnit
        run: |
          mkdir -p "${ASSETS_DIR}/unit"
          gh release download --repo bia-technologies/yaxunit --pattern "YAxUnit-*.cfe" --output "${ASSETS_DIR}/unit/YAXUNIT.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check test inputs
        run: |
          missing=0
          check_file() {
            if [ ! -f "$1" ]; then
              echo "::error::File not found: $1"
              missing=1
            fi
          }
          check_dir() {
            if [ ! -d "$1" ]; then
              echo "::error::Directory not found: $1"
              missing=1
            fi
          }

          check_file "${ASSETS_DIR}/${ADAPTER_CF_XML}"
          check_file "${ASSETS_DIR}/kafka-adapter-base-xml.zip"
          check_file "${ASSETS_DIR}/kafka-adapter-examples.cfe"
          check_file "${ASSETS_DIR}/kfk-tmpl-test.dt"
          check_file "${ASSETS_DIR}/unit/unit.cfe"
          check_file "${ASSETS_DIR}/unit/YaxParams.json"
          check_file "${ASSETS_DIR}/unit/YAXUNIT.cfe"
          check_file "${ASSETS_DIR}/ui/VAParams.json"
          check_dir "${ASSETS_DIR}/ui/features"
          check_file "${ASSETS_DIR}/ui/VAExtension.cfe"
          check_file "${ASSETS_DIR}/ui/vanessa-automation-single.epf"

          if [ "$missing" -ne 0 ]; then
            echo "Downloaded assets:"
            find "${ASSETS_DIR}" -maxdepth 3 -mindepth 1 -print | sort
            exit 1
          fi

      - name: Build base XML for tests
        run: |
          python3 .github/scripts/create_test_cf.py \
            --base "${ASSETS_DIR}/kafka-adapter-base-xml.zip" \
            --adapter "${ASSETS_DIR}/${ADAPTER_CF_XML}" \
            --output "${ASSETS_DIR}/base"

      - name: Create test infobase
        run: |
          docker run --rm -v "${{ github.workspace }}/${ASSETS_DIR}:/work" -w /work \
            ghcr.io/shadobaai/ibcmd:latest bash -c "
            vrunner init-dev --src /work/base --dt /work/kfk-tmpl-test.dt --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/kafka-adapter-examples.cfe --extension 'ТестированиеАдаптераKafka' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/unit/YAXUNIT.cfe --extension 'YAXUNIT' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/unit/unit.cfe --extension 'МодульныеТесты' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/ui/VAExtension.cfe --extension 'VAExtension' --updatedb --ibcmd --ibconnection /F/work/base-db
          "
          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/base-db"

      - name: Fill test infobase
        run: |
          docker run --rm --init \
            -v "${{ github.workspace }}/${ASSETS_DIR}:/work" \
            -v "${{ github.workspace }}/.github/scripts/fill-test-infobase-docker.sh:/fill-test-infobase-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /fill-test-infobase-docker.sh
          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/base-db"

      - name: Backup test infobase
        run: |
          cp "${ASSETS_DIR}/base-db/1Cv8.1CD" "${ASSETS_DIR}/1Cv8.1CD"

      - name: Check test infobase
        run: |
          test -f "${ASSETS_DIR}/1Cv8.1CD"

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: |
          rm -rf "${ASSETS_DIR}/unit/base-unit"
          mkdir -p "${ASSETS_DIR}/unit/base-unit"
          cp "${ASSETS_DIR}/1Cv8.1CD" "${ASSETS_DIR}/unit/base-unit/1Cv8.1CD"

          set +e
          docker run --rm --init \
            -e COVERAGE_SOURCE_DIR=/coverage-source \
            -v "${{ github.workspace }}/${ASSETS_DIR}/unit:/work" \
            -v "${{ github.workspace }}/${ASSETS_DIR}/base:/coverage-source:ro" \
            -v "${{ github.workspace }}/.github/scripts/run-unit-docker.sh:/run-unit-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /run-unit-docker.sh
          rc=$?
          set -e

          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/unit"
          exit "$rc"

      - name: Run UI tests
        id: ui_tests
        if: steps.unit_tests.outcome == 'success'
        continue-on-error: true
        run: |
          rm -rf "${ASSETS_DIR}/ui/base-ui"
          mkdir -p "${ASSETS_DIR}/ui/base-ui"
          cp "${ASSETS_DIR}/1Cv8.1CD" "${ASSETS_DIR}/ui/base-ui/1Cv8.1CD"

          set +e
          docker run --rm --init \
            -e COVERAGE_SOURCE_DIR=/coverage-source \
            -v "${{ github.workspace }}/${ASSETS_DIR}/ui:/work" \
            -v "${{ github.workspace }}/${ASSETS_DIR}/base:/coverage-source:ro" \
            -v "${{ github.workspace }}/.github/scripts/run-ui-docker.sh:/run-ui-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /run-ui-docker.sh
          rc=$?
          set -e

          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/ui"
          exit "$rc"

      - name: Prepare Allure results
        id: allure_results
        if: always()
        run: |
          rm -rf "${ASSETS_DIR}/allure" "${ASSETS_DIR}/allure-report"
          mkdir -p "${ASSETS_DIR}/allure"

          if [ -d "${ASSETS_DIR}/unit/allure" ]; then
            cp -a "${ASSETS_DIR}/unit/allure/." "${ASSETS_DIR}/allure/"
          fi
          if [ -d "${ASSETS_DIR}/ui/allure" ]; then
            cp -a "${ASSETS_DIR}/ui/allure/." "${ASSETS_DIR}/allure/"
          fi

          python3 .github/scripts/add_allure_artifacts.py \
            --results-dir "${ASSETS_DIR}/allure" \
            --unit-dir "${ASSETS_DIR}/unit" \
            --ui-dir "${ASSETS_DIR}/ui"

          if find "${ASSETS_DIR}/allure" -name '*-result.json' -print -quit | grep -q .; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Allure report
        id: allure_report
        if: always() && steps.allure_results.outputs.available == 'true'
        run: |
          npx --yes allure generate "${ASSETS_DIR}/allure" -o "${ASSETS_DIR}/allure-report"
          test -f "${ASSETS_DIR}/allure-report/summary.json"
          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Prepare test report publishing
        id: test_report_publish
        if: always() && steps.allure_report.outputs.generated == 'true'
        run: |
          report_path="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "path=${report_path}" >> "$GITHUB_OUTPUT"
          echo "remote_href=${TEST_REPORTS_BASE_URL}/${report_path}/" >> "$GITHUB_OUTPUT"

      - name: Publish test report links
        if: always() && steps.allure_report.outputs.generated == 'true'
        run: |
          {
            echo "### Allure test report"
            echo ""
            echo "- [Current run](${{ steps.test_report_publish.outputs.remote_href }})"
            echo "- [Latest](${TEST_REPORTS_BASE_URL}/latest/)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout test report storage
        if: always() && steps.allure_report.outputs.generated == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TEST_REPORTS_REPOSITORY }}
          ref: ${{ env.TEST_REPORTS_BRANCH }}
          path: ${{ env.TEST_REPORTS_DIR }}
          token: ${{ secrets.REPORTS_TOKEN }}

      - name: Publish Allure test report
        if: always() && steps.allure_report.outputs.generated == 'true'
        run: |
          report_path="${{ steps.test_report_publish.outputs.path }}"
          report_target="${TEST_REPORTS_DIR}/${report_path}"
          latest_target="${TEST_REPORTS_DIR}/latest"

          rm -rf "${report_target}" "${latest_target}"
          mkdir -p "${report_target}" "${latest_target}"
          cp -a "${ASSETS_DIR}/allure-report/." "${report_target}/"
          cp -a "${ASSETS_DIR}/allure-report/." "${latest_target}/"
          touch "${TEST_REPORTS_DIR}/.nojekyll"

          find "${TEST_REPORTS_DIR}" -mindepth 1 -maxdepth 1 -type d \
            -regextype posix-extended -regex ".*/[0-9]+-[0-9]+" -printf "%f\n" \
            | sort -t '-' -k1,1nr -k2,2nr \
            | tail -n +"$((TEST_REPORTS_KEEP_RUNS + 1))" \
            | while IFS= read -r old_report; do
                rm -rf "${TEST_REPORTS_DIR}/${old_report}"
              done

          git -C "${TEST_REPORTS_DIR}" config user.name "github-actions[bot]"
          git -C "${TEST_REPORTS_DIR}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${TEST_REPORTS_DIR}" add .

          if git -C "${TEST_REPORTS_DIR}" diff --cached --quiet; then
            echo "No Allure test report changes to publish."
          else
            git -C "${TEST_REPORTS_DIR}" commit -m "Publish Allure test report ${report_path}"
            git -C "${TEST_REPORTS_DIR}" push origin "HEAD:${TEST_REPORTS_BRANCH}"
          fi

      - name: Publish Allure test summary
        if: always() && steps.allure_report.outputs.generated == 'true'
        uses: allure-framework/allure-action@v0
        with:
          report-directory: ${{ env.ASSETS_DIR }}/allure-report
          remote-href: ${{ steps.test_report_publish.outputs.remote_href }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Allure test report
        if: always() && steps.allure_report.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: ${{ env.ASSETS_DIR }}/allure-report
          if-no-files-found: warn

      - name: Fail on test errors
        if: always()
        run: |
          if [ "${{ steps.unit_tests.outcome }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/unit/allure" ]; then
            echo "Unit Allure results not found: ${ASSETS_DIR}/unit/allure"
            exit 1
          fi
          if [ ! -f "${ASSETS_DIR}/unit/genericCoverage.xml" ]; then
            echo "Unit coverage report not found: ${ASSETS_DIR}/unit/genericCoverage.xml"
            exit 1
          fi

          if [ "${{ steps.ui_tests.outcome }}" != "success" ]; then
            echo "UI tests failed"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/ui/allure" ]; then
            echo "UI Allure results not found: ${ASSETS_DIR}/ui/allure"
            exit 1
          fi
          if [ ! -f "${ASSETS_DIR}/ui/genericCoverage.xml" ]; then
            echo "UI coverage report not found: ${ASSETS_DIR}/ui/genericCoverage.xml"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/allure-report" ]; then
            echo "Generated Allure test report not found: ${ASSETS_DIR}/allure-report"
            exit 1
          fi
