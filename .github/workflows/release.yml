name: Build & Release

on:
  # GitHub Actions не запускает release.created для draft-релизов.
  release:
    types: [published]

permissions:
  contents: write
  packages: read

jobs:
  build_cf_xml:
    name: Build CF-XML
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout CI scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kafka-tools
          path: .ci

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set version in sources
        id: meta
        run: |
          python3 .ci/.github/scripts/set_version.py \
            "${RELEASE_TAG}" \
            src/CommonModules/кфкОбщегоНазначенияСлужебный/Module.bsl

      - name: Remove SSL objects
        run: python3 .github/scripts/remove_ssl_objects.py

      - name: Convert CFE sources to CF
        run: python3 .github/scripts/cfe2cf.py

      - name: Package EDT
        uses: ./.ci/.github/actions/package-zip
        with:
          source-dir: .
          output-file: output/${{ github.event.repository.name }}-cf-edt.zip

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.owner.outputs.value }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert EDT to XML
        uses: ./.ci/.github/actions/edt2xml
        with:
          source-dir: .
          xml-dir: ${{ runner.temp }}/cf-xml

      - name: Package XML
        uses: ./.ci/.github/actions/package-zip
        with:
          source-dir: ${{ runner.temp }}/cf-xml
          output-file: output/${{ github.event.repository.name }}-cf-xml.zip

      - name: Save CF-XML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cf-xml-artifacts
          path: output/*
          retention-days: 1

  tests:
    name: Tests
    needs: [build_cf_xml]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ASSETS_DIR: assets
      ADAPTER_CF_XML: ${{ github.event.repository.name }}-cf-xml.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CF-XML artifacts
        uses: actions/download-artifact@v4
        with:
          name: cf-xml-artifacts
          path: ${{ env.ASSETS_DIR }}

      - name: Install oras
        run: |
          ORAS_TAG="$(curl -fsSL https://api.github.com/repos/oras-project/oras/releases/latest \
            | jq -r .tag_name)"
          ORAS_VERSION="${ORAS_TAG#v}"
          curl -fsSL "https://github.com/oras-project/oras/releases/download/${ORAS_TAG}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Log in to GHCR for Docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download base and examples release assets
        run: |
          mkdir -p "${ASSETS_DIR}"
          gh release download --repo ShadobaAI/kafka-adapter-base --pattern "kafka-adapter-base-xml.zip" --output "${ASSETS_DIR}/kafka-adapter-base-xml.zip"
          gh release download --repo ShadobaAI/kafka-adapter-examples --pattern "kafka-adapter-examples.cfe" --output "${ASSETS_DIR}/kafka-adapter-examples.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download test DT template
        run: |
          mkdir -p "${ASSETS_DIR}"
          oras pull ghcr.io/shadobaai/kfk-tmpl-test:latest -o "${ASSETS_DIR}"

      - name: Download unit test assets
        run: |
          mkdir -p "${ASSETS_DIR}/unit"
          oras pull ghcr.io/shadobaai/unit:latest -o "${ASSETS_DIR}/unit"
          if [ ! -f "${ASSETS_DIR}/unit/unit.cfe" ] && [ -f "${ASSETS_DIR}/unit/output/unit.cfe" ]; then
            cp "${ASSETS_DIR}/unit/output/unit.cfe" "${ASSETS_DIR}/unit/unit.cfe"
          fi
          curl -fsSL \
            https://raw.githubusercontent.com/ShadobaAI/kafka-adapter-tests-unit/main/YaxParams.json \
            -o "${ASSETS_DIR}/unit/YaxParams.json"

      - name: Download UI test assets
        uses: actions/checkout@v4
        with:
          repository: ShadobaAI/kafka-adapter-tests-ui
          path: ${{ env.ASSETS_DIR }}/ui
          sparse-checkout: |
            /features/**
            /VAParams.json
          sparse-checkout-cone-mode: false

      - name: Download Vanessa Automation
        run: |
          mkdir -p "${ASSETS_DIR}/ui"
          gh release download --repo Pr-Mex/vanessa-automation --pattern "VAExtension*.cfe" --output "${ASSETS_DIR}/ui/VAExtension.cfe"
          gh release download --repo Pr-Mex/vanessa-automation --pattern "vanessa-automation-single.*.zip" --output "${RUNNER_TEMP}/vanessa-automation-single.zip"
          unzip -j "${RUNNER_TEMP}/vanessa-automation-single.zip" "vanessa-automation-single.epf" -d "${ASSETS_DIR}/ui"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download YAxUnit
        run: |
          mkdir -p "${ASSETS_DIR}/unit"
          gh release download --repo bia-technologies/yaxunit --pattern "YAxUnit-*.cfe" --output "${ASSETS_DIR}/unit/YAXUNIT.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check test inputs
        run: |
          missing=0
          check_file() {
            if [ ! -f "$1" ]; then
              echo "::error::File not found: $1"
              missing=1
            fi
          }
          check_dir() {
            if [ ! -d "$1" ]; then
              echo "::error::Directory not found: $1"
              missing=1
            fi
          }

          check_file "${ASSETS_DIR}/${ADAPTER_CF_XML}"
          check_file "${ASSETS_DIR}/kafka-adapter-base-xml.zip"
          check_file "${ASSETS_DIR}/kafka-adapter-examples.cfe"
          check_file "${ASSETS_DIR}/kfk-tmpl-test.dt"
          check_file "${ASSETS_DIR}/unit/unit.cfe"
          check_file "${ASSETS_DIR}/unit/YaxParams.json"
          check_file "${ASSETS_DIR}/unit/YAXUNIT.cfe"
          check_file "${ASSETS_DIR}/ui/VAParams.json"
          check_dir "${ASSETS_DIR}/ui/features"
          check_file "${ASSETS_DIR}/ui/VAExtension.cfe"
          check_file "${ASSETS_DIR}/ui/vanessa-automation-single.epf"

          if [ "$missing" -ne 0 ]; then
            echo "Downloaded assets:"
            find "${ASSETS_DIR}" -maxdepth 3 -mindepth 1 -print | sort
            exit 1
          fi

      - name: Build base XML for tests
        run: |
          python3 .github/scripts/create_test_cf.py \
            --base "${ASSETS_DIR}/kafka-adapter-base-xml.zip" \
            --adapter "${ASSETS_DIR}/${ADAPTER_CF_XML}" \
            --output "${ASSETS_DIR}/base"

      - name: Create test infobase
        run: |
          docker run --rm -v "${{ github.workspace }}/${ASSETS_DIR}:/work" -w /work \
            ghcr.io/shadobaai/ibcmd:latest bash -c "
            vrunner init-dev --src /work/base --dt /work/kfk-tmpl-test.dt --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/kafka-adapter-examples.cfe --extension 'ТестированиеАдаптераKafka' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/unit/YAXUNIT.cfe --extension 'YAXUNIT' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/unit/unit.cfe --extension 'МодульныеТесты' --updatedb --ibcmd --ibconnection /F/work/base-db &&
            vrunner loadext -f /work/ui/VAExtension.cfe --extension 'VAExtension' --updatedb --ibcmd --ibconnection /F/work/base-db
          "
          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/base-db"

      - name: Fill test infobase
        run: |
          docker run --rm --init \
            -v "${{ github.workspace }}/${ASSETS_DIR}:/work" \
            -v "${{ github.workspace }}/.github/scripts/fill-test-infobase-docker.sh:/fill-test-infobase-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /fill-test-infobase-docker.sh
          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/base-db"

      - name: Backup test infobase
        run: |
          cp "${ASSETS_DIR}/base-db/1Cv8.1CD" "${ASSETS_DIR}/1Cv8.1CD"

      - name: Check test infobase
        run: |
          test -f "${ASSETS_DIR}/1Cv8.1CD"

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: |
          rm -rf "${ASSETS_DIR}/unit/base-unit"
          mkdir -p "${ASSETS_DIR}/unit/base-unit"
          cp "${ASSETS_DIR}/1Cv8.1CD" "${ASSETS_DIR}/unit/base-unit/1Cv8.1CD"

          set +e
          docker run --rm --init \
            -v "${{ github.workspace }}/${ASSETS_DIR}/unit:/work" \
            -v "${{ github.workspace }}/.github/scripts/run-unit-docker.sh:/run-unit-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /run-unit-docker.sh
          rc=$?
          set -e

          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/unit"
          exit "$rc"

      - name: Publish unit test summary
        if: always()
        run: python3 .github/scripts/summarize_test_reports.py --unit-junit "${ASSETS_DIR}/unit/junit.xml"

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            ${{ env.ASSETS_DIR }}/unit/junit.xml
            ${{ env.ASSETS_DIR }}/unit/unit.log
            ${{ env.ASSETS_DIR }}/unit/exit-code.txt
          if-no-files-found: warn

      - name: Run UI tests
        id: ui_tests
        if: steps.unit_tests.outcome == 'success'
        continue-on-error: true
        run: |
          rm -rf "${ASSETS_DIR}/ui/base-ui"
          mkdir -p "${ASSETS_DIR}/ui/base-ui"
          cp "${ASSETS_DIR}/1Cv8.1CD" "${ASSETS_DIR}/ui/base-ui/1Cv8.1CD"

          set +e
          docker run --rm --init \
            -v "${{ github.workspace }}/${ASSETS_DIR}/ui:/work" \
            -v "${{ github.workspace }}/.github/scripts/run-ui-docker.sh:/run-ui-docker.sh:ro" \
            -w /work \
            ghcr.io/shadobaai/client:latest \
            bash /run-ui-docker.sh
          rc=$?
          set -e

          sudo chown -R "$(id -u):$(id -g)" "${ASSETS_DIR}/ui"
          exit "$rc"

      - name: Generate Allure report
        if: always() && steps.unit_tests.outcome == 'success'
        run: |
          if [ -d "${ASSETS_DIR}/ui/allure" ]; then
            npx --yes allure-commandline generate "${ASSETS_DIR}/ui/allure" --clean -o "${ASSETS_DIR}/ui/allure-report"
          fi

      - name: Publish UI test summary
        if: always() && steps.unit_tests.outcome == 'success'
        run: python3 .github/scripts/summarize_test_reports.py --ui-allure "${ASSETS_DIR}/ui/allure"

      - name: Upload UI test reports
        if: always() && steps.unit_tests.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports
          path: |
            ${{ env.ASSETS_DIR }}/ui/allure
            ${{ env.ASSETS_DIR }}/ui/allure-report
            ${{ env.ASSETS_DIR }}/ui/1cv8c.log
            ${{ env.ASSETS_DIR }}/ui/exit-code.txt
          if-no-files-found: warn

      - name: Fail on test errors
        if: always()
        run: |
          if [ "${{ steps.unit_tests.outcome }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ ! -f "${ASSETS_DIR}/unit/junit.xml" ]; then
            echo "Unit JUnit report not found: ${ASSETS_DIR}/unit/junit.xml"
            exit 1
          fi

          if [ "${{ steps.ui_tests.outcome }}" != "success" ]; then
            echo "UI tests failed"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/ui/allure" ]; then
            echo "UI Allure results not found: ${ASSETS_DIR}/ui/allure"
            exit 1
          fi
          if [ ! -d "${ASSETS_DIR}/ui/allure-report" ]; then
            echo "Generated UI Allure report not found: ${ASSETS_DIR}/ui/allure-report"
            exit 1
          fi

  build_cf:
    name: Build CF
    needs: [tests]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kafka-tools
          path: .ci

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.owner.outputs.value }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CF-XML artifacts
        uses: actions/download-artifact@v4
        with:
          name: cf-xml-artifacts
          path: output

      - name: Unpack CF-XML
        run: |
          mkdir -p "${{ runner.temp }}/cf-xml"
          unzip -q "output/${{ github.event.repository.name }}-cf-xml.zip" -d "${{ runner.temp }}/cf-xml"

      - name: Build CF
        uses: ./.ci/.github/actions/xml2cf
        with:
          xml-dir: ${{ runner.temp }}/cf-xml
          output-file: output/${{ github.event.repository.name }}.cf

      - name: Upload CF artifacts to release
        run: gh release upload "${RELEASE_TAG}" output/* --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_cfe:
    name: Build CFE
    needs: [tests]
    uses: ShadobaAI/kafka-tools/.github/workflows/release-1c-artifacts.yml@main
    secrets: inherit
    with:
      name_suffix: cfe
      version_files: src/CommonModules/кфкОбщегоНазначенияСлужебный/Module.bsl

  build_dt:
    name: Build demo DT
    needs: [build_cfe]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Download kafka-adapter CFE XML
        run: gh release download "${RELEASE_TAG}" --repo ${{ github.repository }} --pattern "${{ github.event.repository.name }}-cfe-xml.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack kafka-adapter CFE XML
        run: unzip -q "${{ github.event.repository.name }}-cfe-xml.zip" -d cfe-xml

      - name: Install oras
        run: |
          ORAS_TAG="$(curl -fsSL https://api.github.com/repos/oras-project/oras/releases/latest \
            | jq -r .tag_name)"
          ORAS_VERSION="${ORAS_TAG#v}"
          curl -fsSL "https://github.com/oras-project/oras/releases/download/${ORAS_TAG}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras

      - name: Download kfk-tmpl-demo.dt from GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin
          oras pull ghcr.io/shadobaai/kfk-tmpl-demo:latest

      - name: Download kafka-base.cf
        run: gh release download --repo ShadobaAI/kafka-adapter-base --pattern "kafka-adapter-base.cf" --output base.cf
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download kafka-adapter-examples.cfe
        run: gh release download --repo ShadobaAI/kafka-adapter-examples --pattern "kafka-adapter-examples.cfe" --output examples.cfe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build demo DT from CFE XML
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            ghcr.io/shadobaai/ibcmd:latest bash -c "
            vrunner init-dev --dt kfk-tmpl-demo.dt --cf base.cf --ibconnection /F/work/db --ibcmd &&
            vrunner compileext /work/cfe-xml АдаптерKafka --ibconnection /F/work/db --updatedb --ibcmd &&
            vrunner loadext --file examples.cfe --ibconnection /F/work/db --extension ТестированиеАдаптераKafka --updatedb --ibcmd &&
            vrunner dump /work/${{ github.event.repository.name }}-demo.dt --ibconnection /F/work/db --ibcmd
          "
          sudo chown $(id -u):$(id -g) ${{ github.event.repository.name }}-demo.dt

      - name: Upload ${{ github.event.repository.name }}-demo.dt to release
        run: gh release upload "${RELEASE_TAG}" ${{ github.event.repository.name }}-demo.dt --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
