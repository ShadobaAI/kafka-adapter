name: Build & Release

on:
  release:
    types: [created]

permissions:
  contents: write
  packages: read

jobs:
  build_cfe:
    name: Сборка CFE
    uses: ShadobaAI/kafka-tools/.github/workflows/build.yml@main
    with:
      name_suffix: cfe
      version_files: src/CommonModules/кфкОбщегоНазначенияСлужебный/Module.bsl
      dockerhub_image: ${{ vars.DOCKERHUB_IMAGE }}

  build_cf:
    name: Сборка CF
    uses: ShadobaAI/kafka-tools/.github/workflows/build.yml@main
    with:
      build_type: cf
      name_suffix: cf
      version_files: src/CommonModules/кфкОбщегоНазначенияСлужебный/Module.bsl
      dockerhub_image: ${{ vars.DOCKERHUB_IMAGE }}
      pre_script: .github/scripts/remove_ssl_objects.py

  build_dt:
    name: Сборка DT
    needs: [build_cfe]
    runs-on: ubuntu-latest
    steps:
      - name: Загрузка kafka-adapter.cfe
        run: gh release download ${{ github.event.release.tag_name }} --repo ${{ github.repository }} --pattern "${{ github.event.repository.name }}.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Установка oras
        run: |
          curl -sL "https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin oras

      - name: Загрузка template.dt из GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin
          oras pull ghcr.io/shadobaai/kfk-tmpl-dt:latest

      - name: Загрузка kafka-base.cf
        run: gh release download --repo ShadobaAI/kafka-adapter-base --pattern "kafka-adapter-base.cf" --output base.cf
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Загрузка kafka-adapter-tester.cfe
        run: gh release download --repo ShadobaAI/kafka-adapter-tester --pattern "kafka-adapter-tester.cfe" --output tester.cfe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Логин в GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u shadobaai --password-stdin

      - name: Сборка DT
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            ghcr.io/shadobaai/${{ vars.DOCKERHUB_IMAGE }}:latest bash -c "
            vrunner init-dev --dt template.dt --cf base.cf --ibconnection /F/work/db --ibcmd &&
            vrunner loadext --file ${{ github.event.repository.name }}.cfe --ibconnection /F/work/db --extension АдаптерKafka --updatedb --ibcmd &&
            vrunner loadext --file tester.cfe --ibconnection /F/work/db --extension ТестированиеАдаптераKafka --updatedb --ibcmd &&
            vrunner dump /work/${{ github.event.repository.name }}-demo.dt --ibconnection /F/work/db --ibcmd
          "
          sudo chown $(id -u):$(id -g) ${{ github.event.repository.name }}-demo.dt

      - name: Публикация ${{ github.event.repository.name }}-demo.dt в релиз
        run: gh release upload ${{ github.event.release.tag_name }} ${{ github.event.repository.name }}-demo.dt --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Сохранение ${{ github.event.repository.name }}-demo.dt
        uses: actions/upload-artifact@v4
        with:
          name: demo-dt
          path: ${{ github.event.repository.name }}-demo.dt
          retention-days: 1
