name: Build & Release

on:
  # GitHub Actions не запускает release.created для draft-релизов.
  release:
    types: [published]

permissions:
  actions: read
  checks: write
  contents: write
  packages: read

jobs:
  build_cf_xml:
    name: Build CF-XML
    uses: ./.github/workflows/release-build-cf-xml.yml
    secrets: inherit

  quality:
    name: Quality
    needs: [build_cf_xml]
    permissions:
      contents: read
      actions: read
      checks: write
      packages: read
      pull-requests: write
    uses: ./.github/workflows/release-quality.yml
    secrets: inherit

  update_release_notes:
    name: Add release report links to release
    needs: [quality]
    if: always() && needs.quality.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      ALLURE_UI_REPORT_URL: ${{ needs.quality.outputs.allure_ui_report_url }}
      ALLURE_UNIT_REPORT_URL: ${{ needs.quality.outputs.allure_unit_report_url }}
      SONAR_SUMMARY_URL: ${{ needs.quality.outputs.sonar_summary_url }}
      SONAR_DASHBOARD_URL: ${{ needs.quality.outputs.sonar_dashboard_url }}
    steps:
      - name: Add release report links
        run: |
          if [ -z "${ALLURE_UI_REPORT_URL}" ] || [ -z "${ALLURE_UNIT_REPORT_URL}" ] || [ -z "${SONAR_SUMMARY_URL}" ]; then
            echo "::warning::Release report URLs are incomplete. Release notes were not changed."
            exit 0
          fi

          body_file="$(mktemp)"
          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json body --jq .body > "$body_file"

          python3 - "$body_file" "$ALLURE_UI_REPORT_URL" "$ALLURE_UNIT_REPORT_URL" "$SONAR_SUMMARY_URL" "$SONAR_DASHBOARD_URL" <<'PY'
          import pathlib
          import re
          import sys

          body_path = pathlib.Path(sys.argv[1])
          allure_ui_url = sys.argv[2]
          allure_unit_url = sys.argv[3]
          sonar_summary_url = sys.argv[4]
          sonar_dashboard_url = sys.argv[5]
          marker = "## Отчеты релиза"
          legacy_marker_ru = "## Отчет тестирования"
          legacy_marker = "## Test report"
          links = [
              f"- [Allure UI tests report]({allure_ui_url})",
              f"- [Allure Unit tests report]({allure_unit_url})",
              f"- [SonarQube summary]({sonar_summary_url})",
          ]
          if sonar_dashboard_url:
              links.append(f"- [SonarQube dashboard]({sonar_dashboard_url})")
          block = f"{marker}\n\n" + "\n".join(links) + "\n"

          body = body_path.read_text(encoding="utf-8")
          pattern = rf"(?ms)^({re.escape(marker)}|{re.escape(legacy_marker_ru)}|{re.escape(legacy_marker)})\n.*?(?=^## |\Z)"
          if re.search(pattern, body):
              body = re.sub(pattern, block + "\n", body).rstrip() + "\n"
          else:
              body = f"{body.rstrip()}\n\n{block}" if body.strip() else block

          body_path.write_text(body, encoding="utf-8")
          PY

          gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --notes-file "$body_file"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_cf:
    name: Build CF
    needs: [quality]
    uses: ./.github/workflows/release-build-cf.yml
    secrets: inherit

  build_cfe:
    name: Build CFE
    needs: [quality]
    uses: ./.github/workflows/release-build-cfe.yml
    secrets: inherit

  build_dt:
    name: Build demo DT
    needs: [build_cfe]
    uses: ./.github/workflows/release-build-dt.yml
    secrets: inherit
