name: Build & Release

on:
  release:
    types: [created]

permissions:
  contents: write
  packages: read

jobs:
  build_cf_xml:
    name: Build CF-XML
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout CI scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kafka-tools
          path: .ci

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set version in sources
        id: meta
        run: |
          python3 .ci/.github/scripts/set_version.py \
            "${{ github.ref_name }}" \
            src/CommonModules/кфкОбщегоНазначенияСлужебный/Module.bsl

      - name: Remove SSL objects
        run: python3 .github/scripts/remove_ssl_objects.py

      - name: Convert CFE sources to CF
        run: python3 .github/scripts/cfe2cf.py

      - name: Package EDT
        uses: ./.ci/.github/actions/package-zip
        with:
          source-dir: .
          output-file: output/${{ github.event.repository.name }}-cf-edt.zip

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.owner.outputs.value }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert EDT to XML
        uses: ./.ci/.github/actions/edt2xml
        with:
          source-dir: .
          xml-dir: ${{ runner.temp }}/cf-xml

      - name: Package XML
        uses: ./.ci/.github/actions/package-zip
        with:
          source-dir: ${{ runner.temp }}/cf-xml
          output-file: output/${{ github.event.repository.name }}-cf-xml.zip

      - name: Save CF-XML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cf-xml-artifacts
          path: output/*
          retention-days: 1

  tests:
    name: Tests
    needs: [build_cf_xml]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ASSETS_DIR: assets
    steps:
      - name: Download CF-XML artifacts
        uses: actions/download-artifact@v4
        with:
          name: cf-xml-artifacts
          path: ${{ env.ASSETS_DIR }}

      - name: Install oras
        run: |
          ORAS_TAG="$(curl -fsSL https://api.github.com/repos/oras-project/oras/releases/latest \
            | jq -r .tag_name)"
          ORAS_VERSION="${ORAS_TAG#v}"
          curl -fsSL "https://github.com/oras-project/oras/releases/download/${ORAS_TAG}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Download base and examples release assets
        run: |
          mkdir -p "${ASSETS_DIR}"
          gh release download --repo ShadobaAI/kafka-adapter-base --pattern "kafka-adapter-base-xml.zip" --output "${ASSETS_DIR}/kafka-adapter-base-xml.zip"
          gh release download --repo ShadobaAI/kafka-adapter-examples --pattern "kafka-adapter-examples.cfe" --output "${ASSETS_DIR}/kafka-adapter-examples.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download test DT template
        run: |
          mkdir -p "${ASSETS_DIR}"
          oras pull ghcr.io/shadobaai/kfk-tmpl-test:latest -o "${ASSETS_DIR}"

      - name: Download unit test assets
        run: |
          mkdir -p "${ASSETS_DIR}/unit"
          oras pull ghcr.io/shadobaai/unit:latest -o "${ASSETS_DIR}/unit"
          curl -fsSL \
            https://raw.githubusercontent.com/ShadobaAI/kafka-adapter-tests-unit/main/YaxParams.json \
            -o "${ASSETS_DIR}/unit/YaxParams.json"

      - name: Download UI test assets
        uses: actions/checkout@v4
        with:
          repository: ShadobaAI/kafka-adapter-tests-ui
          path: ${{ env.ASSETS_DIR }}/ui
          sparse-checkout: |
            /features/**
            /VAParams.json
          sparse-checkout-cone-mode: false

      - name: Download Vanessa Automation
        run: |
          mkdir -p "${ASSETS_DIR}/ui"
          gh release download --repo Pr-Mex/vanessa-automation --pattern "VAExtension*.cfe" --output "${ASSETS_DIR}/ui/VAExtension.cfe"
          gh release download --repo Pr-Mex/vanessa-automation --pattern "vanessa-automation-single.*.zip" --output "${RUNNER_TEMP}/vanessa-automation-single.zip"
          unzip -j "${RUNNER_TEMP}/vanessa-automation-single.zip" "vanessa-automation-single.epf" -d "${ASSETS_DIR}/ui"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download YAxUnit
        run: |
          mkdir -p "${ASSETS_DIR}/unit"
          gh release download --repo bia-technologies/yaxunit --pattern "YAxUnit-*.cfe" --output "${ASSETS_DIR}/unit/YAXUNIT.cfe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check test inputs
        run: |
          test -f "${ASSETS_DIR}/kafka-adapter-cf-xml.zip"
          test -f "${ASSETS_DIR}/kafka-adapter-base-xml.zip"
          test -f "${ASSETS_DIR}/kafka-adapter-examples.cfe"
          test -f "${ASSETS_DIR}/kfk-tmpl-test.dt"
          test -f "${ASSETS_DIR}/unit/unit.cfe"
          test -f "${ASSETS_DIR}/unit/YaxParams.json"
          test -f "${ASSETS_DIR}/unit/YAXUNIT.cfe"
          test -f "${ASSETS_DIR}/ui/VAParams.json"
          test -d "${ASSETS_DIR}/ui/features"
          test -f "${ASSETS_DIR}/ui/VAExtension.cfe"
          test -f "${ASSETS_DIR}/ui/vanessa-automation-single.epf"

      - name: Run tests
        run: echo "Test inputs are prepared for ${{ github.event.repository.name }}-cf-xml.zip"

  build_cf:
    name: Build CF
    needs: [tests]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/kafka-tools
          path: .ci

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.owner.outputs.value }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download CF-XML artifacts
        uses: actions/download-artifact@v4
        with:
          name: cf-xml-artifacts
          path: output

      - name: Unpack CF-XML
        run: |
          mkdir -p "${{ runner.temp }}/cf-xml"
          unzip -q "output/${{ github.event.repository.name }}-cf-xml.zip" -d "${{ runner.temp }}/cf-xml"

      - name: Build CF
        uses: ./.ci/.github/actions/xml2cf
        with:
          xml-dir: ${{ runner.temp }}/cf-xml
          output-file: output/${{ github.event.repository.name }}.cf

      - name: Upload CF artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*

  build_cfe:
    name: Build CFE
    needs: [tests]
    uses: ShadobaAI/kafka-tools/.github/workflows/release-1c-artifacts.yml@main
    secrets: inherit
    with:
      name_suffix: cfe
      version_files: src/CommonModules/кфкОбщегоНазначенияСлужебный/Module.bsl

  build_dt:
    name: Build demo DT
    needs: [build_cfe]
    runs-on: ubuntu-latest
    steps:
      - name: Download kafka-adapter CFE XML
        run: gh release download ${{ github.event.release.tag_name }} --repo ${{ github.repository }} --pattern "${{ github.event.repository.name }}-cfe-xml.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack kafka-adapter CFE XML
        run: unzip -q "${{ github.event.repository.name }}-cfe-xml.zip" -d cfe-xml

      - name: Install oras
        run: |
          ORAS_TAG="$(curl -fsSL https://api.github.com/repos/oras-project/oras/releases/latest \
            | jq -r .tag_name)"
          ORAS_VERSION="${ORAS_TAG#v}"
          curl -fsSL "https://github.com/oras-project/oras/releases/download/${ORAS_TAG}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin oras

      - name: Download kfk-tmpl-demo.dt from GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin
          oras pull ghcr.io/shadobaai/kfk-tmpl-demo:latest

      - name: Download kafka-base.cf
        run: gh release download --repo ShadobaAI/kafka-adapter-base --pattern "kafka-adapter-base.cf" --output base.cf
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download kafka-adapter-examples.cfe
        run: gh release download --repo ShadobaAI/kafka-adapter-examples --pattern "kafka-adapter-examples.cfe" --output examples.cfe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build demo DT from CFE XML
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            ghcr.io/shadobaai/ibcmd:latest bash -c "
            vrunner init-dev --dt kfk-tmpl-demo.dt --cf base.cf --ibconnection /F/work/db --ibcmd &&
            vrunner compileext /work/cfe-xml АдаптерKafka --ibconnection /F/work/db --updatedb --ibcmd &&
            vrunner loadext --file examples.cfe --ibconnection /F/work/db --extension ТестированиеАдаптераKafka --updatedb --ibcmd &&
            vrunner dump /work/${{ github.event.repository.name }}-demo.dt --ibconnection /F/work/db --ibcmd
          "
          sudo chown $(id -u):$(id -g) ${{ github.event.repository.name }}-demo.dt

      - name: Upload ${{ github.event.repository.name }}-demo.dt to release
        run: gh release upload ${{ github.event.release.tag_name }} ${{ github.event.repository.name }}-demo.dt --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release:
    name: Publish release
    if: false
    needs: [build_cf, build_dt]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        run: gh release edit ${{ github.event.release.tag_name }} --repo ${{ github.repository }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
